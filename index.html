<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Social</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  margin: 0;
}

header {
  background: #6c5ce7;
  color: white;
  padding: 15px;
  text-align: center;
}

.feed {
  max-width: 500px;
  margin: 20px auto;
}

.post {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 50px;
  border-radius: 50%;
}

.name {
  font-weight: bold;
}

.username {
  color: gray;
  font-size: 14px;
}

.post-text {
  margin: 15px 0;
}

.post-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

button {
  border: none;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
}

.likeBtn {
  background: #dfe6e9;
}

.dislikeBtn {
  background: #dfe6e9;
}

.liked {
  background: #6c5ce7;
  color: white;
}

.disliked {
  background: #d63031;
  color: white;
}
</style>

</head>

<body>

<header>
  <h1>Mini Social 💜</h1>
</header>

<main class="feed">

  <article class="post">

    <div class="post-header">
      <img src="https://www.kindpng.com/picc/m/21-215214_dibujos-animados-png-images-simon-alvin-e-os.png" class="avatar">

      <div>
        <span class="name">saimon</span><br>
        <span class="username">@gabizao</span>
      </div>
    </div>

    <p class="post-text">
      Hoje foi dia de pão na chapa e um pouco de drama 👩‍💻🔥
    </p>

    <div class="post-actions">
      <button class="likeBtn">👍<span class="likeCount">0</span> Curtir</button>
<button class="dislikeBtn">👎<span class="dislikeCount">0</span> Descurtir</button>
    </div>

  </article>

</main>

<script>
const likeBtn = document.querySelector(".likeBtn");
const dislikeBtn = document.querySelector(".dislikeBtn");

const likeCountSpan = document.querySelector(".likeCount");
const dislikeCountSpan = document.querySelector(".dislikeCount");

let likeCount = 0;
let dislikeCount = 0;

let liked = false;
let disliked = false;

likeBtn.addEventListener("click", function() {

  if (!liked) {
    liked = true;
    likeBtn.classList.add("liked");
    likeCount++;

    if (disliked) {
      disliked = false;
      dislikeBtn.classList.remove("disliked");
      dislikeCount--;
    }

  } else {
    liked = false;
    likeBtn.classList.remove("liked");
    likeCount--;
  }

  likeCountSpan.textContent = likeCount;
  dislikeCountSpan.textContent = dislikeCount;
});

dislikeBtn.addEventListener("click", function() {

  if (!disliked) {
    disliked = true;
    dislikeBtn.classList.add("disliked");
    dislikeCount++;

    if (liked) {
      liked = false;
      likeBtn.classList.remove("liked");
      likeCount--;
    }

  } else {
    disliked = false;
    dislikeBtn.classList.remove("disliked");
    dislikeCount--;
  }

  likeCountSpan.textContent = likeCount;
  dislikeCountSpan.textContent = dislikeCount;
});
</script>

</body>
</html>
