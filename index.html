<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Social</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  margin: 0;
}

/* HEADER */
header {
  background: #1877f2;
  color: white;
  padding: 15px;
  text-align: center;
}

/* FEED */
.feed {
  max-width: 500px;
  margin: 20px auto;
}

/* POST */
.post {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* HEADER POST */
.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 50px;
  border-radius: 50%;
}

.avatar-small {
  width: 30px;
  border-radius: 50%;
}

.name {
  font-weight: bold;
  display: block;
}

.username {
  color: gray;
  font-size: 14px;
}

/* TEXTO */
.post-text {
  margin: 15px 0;
}

/* BOTÃO */
.post-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.likeBtn {
  border: none;
  background: #e4e6eb;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.likeBtn:hover {
  background: #d8dadf;
}

.liked {
  background: #1877f2;
  color: white;
}

/* COMENTÁRIOS */
.comments {
  margin-top: 15px;
}

.comment {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<header>
  <h1>Mini Social 🚀</h1>
</header>

<main class="feed">

  <article class="post">

    <div class="post-header">
      <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="avatar">
      <div>
        <span class="name">gabis</span>
        <span class="username">@gabizao</span>
      </div>
    </div>

    <p class="post-text">
      Hoje vamos aprender a fazer um pão na chapa 😋🔥
    </p>

    <div class="post-actions">
      <button class="likeBtn">❤️ Curtir</button>
      <span class="likeCount">0</span>
    </div>

    <section class="comments">

      <div class="comment">
        <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="avatar-small">
        <p>vamos lá meninas! 🔥</p>
      </div>

      <div class="comment">
        <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="avatar-small">
        <p>
          Bota a mão na chapa! Primeiro pegue o pão, passe manteiga e leve à frigideira até dourar. Bom apetite 😍
        </p>
      </div>

    </section>

  </article>

</main>

<script>
const buttons = document.querySelectorAll(".likeBtn");

buttons.forEach((btn) => {
  btn.addEventListener("click", () => {
    const countSpan = btn.nextElementSibling;
    let count = parseInt(countSpan.innerText);

    if (btn.classList.contains("liked")) {
      count--;
      btn.classList.remove("liked");
      btn.innerText = "❤️ Curtir";
    } else {
      count++;
      btn.classList.add("liked");
      btn.innerText = "💙 Curtido";
    }

    countSpan.innerText = count;
  });
});
</script>

</body>
</html>
