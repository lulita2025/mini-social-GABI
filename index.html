<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Social</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  margin: 0;
}

header {
  background: #6c5ce7;
  color: white;
  padding: 15px;
  text-align: center;
}

.feed {
  max-width: 500px;
  margin: 20px auto;
}

.post {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 50px;
  border-radius: 50%;
}

.name {
  font-weight: bold;
}

.username {
  color: gray;
  font-size: 14px;
}

.post-text {
  margin: 15px 0;
}

.post-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

button {
  border: none;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
}

.likeBtn {
  background: #dfe6e9;
}

.dislikeBtn {
  background: #dfe6e9;
}

.liked {
  background: #6c5ce7;
  color: white;
}

.disliked {
  background: #d63031;
  color: white;
}
</style>

</head>

<body>

<header>
  <h1>Mini Social 💜</h1>
</header>

<main class="feed">

  <article class="post">

    <div class="post-header">
      <!-- CAPIVARA -->
      <img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" class="avatar">

      <div>
        <span class="name">gabis</span><br>
        <span class="username">@gabizao</span>
      </div>
    </div>

    <p class="post-text">
      Hoje foi dia de pão na chapa e um pouco de drama 👩‍💻🔥
    </p>

    <div class="post-actions">
      <button class="likeBtn">👍 Curtir</button>
      <button class="dislikeBtn">👎 Descurtir</button>
      <span class="likeCount">0</span>
    </div>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
