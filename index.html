<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Social</title>

<style>
body {
  font-family: Arial, sans-serif;
    background: #f0f2f5;
      margin: 0;
      }
      
      header {
        background: #1877f2;
          color: white;
            padding: 15px;
              text-align: center;
              }
              
              .feed {
                max-width: 500px;
                  margin: 20px auto;
                  }
                  
                  .post {
                    background: white;
                      padding: 15px;
                        border-radius: 10px;
                          margin-bottom: 20px;
                            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                            }
                            
                            .post-header {
                              display: flex;
                                align-items: center;
                                  gap: 10px;
                                  }
                                  
                                  .avatar {
                                    width: 50px;
                                      border-radius: 50%;
                                      }
                                      
                                      .avatar-small {
                                        width: 30px;
                                          border-radius: 50%;
                                          }
                                          
                                          .name {
                                            font-weight: bold;
                                            }
                                            
                                            .username {
                                              color: gray;
                                                font-size: 14px;
                                                }
                                                
                                                .post-text {
                                                  margin: 15px 0;
                                                  }
                                                  
                                                  .post-actions {
                                                    display: flex;
                                                      align-items: center;
                                                        gap: 10px;
                                                        }
                                                        
                                                        /* BOTÕES */
                                                        button {
                                                          border: none;
                                                            padding: 8px 12px;
                                                              border-radius: 20px;
                                                                cursor: pointer;
                                                                }
                                                                
                                                                .likeBtn {
                                                                  background: #e4e6eb;
                                                                  }
                                                                  
                                                                  .dislikeBtn {
                                                                    background: #e4e6eb;
                                                                    }
                                                                    
                                                                    .liked {
                                                                      background: #1877f2;
                                                                        color: white;
                                                                        }
                                                                        
                                                                        .disliked {
                                                                          background: #f02849;
                                                                            color: white;
                                                                            }
                                                                            </style>
                                                                            
                                                                            </head>
                                                                            
                                                                            <body>
                                                                            
                                                                            <header>
                                                                              <h1>Mini Social 🚀</h1>
                                                                              </header>
                                                                              
                                                                              <main class="feed">
                                                                              
                                                                                <article class="post">
                                                                                
                                                                                    <div class="post-header">
                                                                                          <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="avatar">
                                                                                                <div>
                                                                                                        <span class="name">gabis</span><br>
                                                                                                                <span class="username">@gabizao</span>
                                                                                                                      </div>
                                                                                                                          </div>
                                                                                                                          
                                                                                                                              <p class="post-text">
                                                                                                                                    Hoje vamos aprender a fazer um pão na chapa 😋🔥
                                                                                                                                        </p>
                                                                                                                                        
                                                                                                                                            <div class="post-actions">
                                                                                                                                                  <button class="likeBtn">👍 Curtir</button>
                                                                                                                                                        <button class="dislikeBtn">👎 Descurtir</button>
                                                                                                                                                              <span class="likeCount">0</span>
                                                                                                                                                                  </div>
                                                                                                                                                                  
                                                                                                                                                                    </article>
                                                                                                                                                                    
                                                                                                                                                                    </main>
                                                                                                                                                                    
                                                                                                                                                                    <script>
                                                                                                                                                                    const posts = document.querySelectorAll(".post");
                                                                                                                                                                    
                                                                                                                                                                    posts.forEach((post) => {
                                                                                                                                                                      const likeBtn = post.querySelector(".likeBtn");
                                                                                                                                                                        const dislikeBtn = post.querySelector(".dislikeBtn");
                                                                                                                                                                          const countSpan = post.querySelector(".likeCount");
                                                                                                                                                                          
                                                                                                                                                                            let count = 0;
                                                                                                                                                                              let liked = false;
                                                                                                                                                                                let disliked = false;
                                                                                                                                                                                
                                                                                                                                                                                  likeBtn.addEventListener("click", () => {
                                                                                                                                                                                      if (!liked) {
                                                                                                                                                                                            count++;
                                                                                                                                                                                                  liked = true;
                                                                                                                                                                                                        likeBtn.classList.add("liked");
                                                                                                                                                                                                        
                                                                                                                                                                                                              // se estava descurtido, remove
                                                                                                                                                                                                                    if (disliked) {
                                                                                                                                                                                                                            disliked = false;
                                                                                                                                                                                                                                    dislikeBtn.classList.remove("disliked");
                                                                                                                                                                                                                                            count++;
                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                      } else {
                                                                                                                                                                                                                                                            count--;
                                                                                                                                                                                                                                                                  liked = false;
                                                                                                                                                                                                                                                                        likeBtn.classList.remove("liked");
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                countSpan.innerText = count;
                                                                                                                                                                                                                                                                                  });
                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                    dislikeBtn.addEventListener("click", () => {
                                                                                                                                                                                                                                                                                        if (!disliked) {
                                                                                                                                                                                                                                                                                              count--;
                                                                                                                                                                                                                                                                                                    disliked = true;
                                                                                                                                                                                                                                                                                                          dislikeBtn.classList.add("disliked");
                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                // se estava curtido, remove
                                                                                                                                                                                                                                                                                                                      if (liked) {
                                                                                                                                                                                                                                                                                                                              liked = false;
                                                                                                                                                                                                                                                                                                                                      likeBtn.classList.remove("liked");
                                                                                                                                                                                                                                                                                                                                              count--;
                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                        } else {
                                                                                                                                                                                                                                                                                                                                                              count++;
                                                                                                                                                                                                                                                                                                                                                                    disliked = false;
                                                                                                                                                                                                                                                                                                                                                                          dislikeBtn.classList.remove("disliked");
                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                  countSpan.innerText = count;
                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                    </script>
                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                    </html>>
